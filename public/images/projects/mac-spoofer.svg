<svg xmlns="http://www.w3.org/2000/svg" width="1344" height="768" viewBox="0 0 1344 768">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0f1419"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1344" height="768" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#10b981" stroke-width="0.5"/>
    </pattern>
    <rect width="1344" height="768" fill="url(#grid)"/>
  </g>
  
  <!-- WiFi Signal Waves -->
  <g transform="translate(200, 300)" filter="url(#glow)">
    <path d="M 0 150 Q 75 100, 150 150" fill="none" stroke="#10b981" stroke-width="3" opacity="0.3"/>
    <path d="M 20 120 Q 75 80, 130 120" fill="none" stroke="#10b981" stroke-width="3" opacity="0.5"/>
    <path d="M 40 90 Q 75 60, 110 90" fill="none" stroke="#10b981" stroke-width="3" opacity="0.7"/>
    <path d="M 60 60 Q 75 40, 90 60" fill="none" stroke="#10b981" stroke-width="3"/>
    <circle cx="75" cy="170" r="12" fill="#10b981"/>
  </g>
  
  <!-- Terminal Window -->
  <g transform="translate(500, 150)">
    <rect x="0" y="0" width="500" height="320" rx="10" fill="#1a1a2e" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="500" height="35" rx="10" fill="#16213e"/>
    <circle cx="25" cy="17" r="6" fill="#ff5f56"/>
    <circle cx="45" cy="17" r="6" fill="#ffbd2e"/>
    <circle cx="65" cy="17" r="6" fill="#27ca40"/>
    <text x="250" y="22" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="12">mac-spoofer.py</text>
    
    <!-- Terminal content -->
    <text x="15" y="60" fill="#06b6d4" font-family="monospace" font-size="11">$ sudo python3 macspoofer.py</text>
    <text x="15" y="85" fill="#10b981" font-family="monospace" font-size="11">[*] Scanning for networks...</text>
    <text x="15" y="110" fill="#e2e8f0" font-family="monospace" font-size="11">[+] Network: WiFi_Home | BSSID: A4:B1:C2:D3:E4:F5</text>
    <text x="15" y="135" fill="#e2e8f0" font-family="monospace" font-size="11">[+] Network: Office_5G  | BSSID: 12:34:56:78:9A:BC</text>
    <text x="15" y="160" fill="#10b981" font-family="monospace" font-size="11">[*] Found 12 connected clients</text>
    <text x="15" y="185" fill="#f59e0b" font-family="monospace" font-size="11">[!] Client: 192.168.1.105 | MAC: AA:BB:CC:DD:EE:FF</text>
    <text x="15" y="210" fill="#f59e0b" font-family="monospace" font-size="11">[!] Client: 192.168.1.110 | MAC: 11:22:33:44:55:66</text>
    <text x="15" y="235" fill="#10b981" font-family="monospace" font-size="11">[*] Spoofing MAC to: AA:BB:CC:DD:EE:FF</text>
    <text x="15" y="260" fill="#22c55e" font-family="monospace" font-size="11">[✓] MAC address changed successfully!</text>
    <text x="15" y="285" fill="#06b6d4" font-family="monospace" font-size="11">$ _</text>
  </g>
  
  <!-- MAC Address Visual -->
  <g transform="translate(1050, 200)">
    <rect x="0" y="0" width="240" height="180" rx="8" fill="#1a1a2e" stroke="#06b6d4" stroke-width="1"/>
    <text x="120" y="30" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="12" font-weight="bold">TARGET MAC</text>
    <text x="120" y="80" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="18" filter="url(#glow)">AA:BB:CC:DD:EE:FF</text>
    <rect x="20" y="100" width="200" height="30" rx="4" fill="#0f1419"/>
    <text x="120" y="120" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="10">Device: iPhone 14 Pro</text>
    <text x="120" y="155" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Signal: -45 dBm | Channel: 6</text>
  </g>
  
  <!-- Network Nodes -->
  <g transform="translate(150, 500)">
    <circle cx="0" cy="0" r="30" fill="#1a1a2e" stroke="#10b981" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="10">Router</text>
    
    <line x1="30" y1="0" x2="150" y2="-50" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <circle cx="180" cy="-50" r="20" fill="#1a1a2e" stroke="#06b6d4" stroke-width="1"/>
    
    <line x1="30" y1="0" x2="150" y2="0" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <circle cx="180" cy="0" r="20" fill="#1a1a2e" stroke="#06b6d4" stroke-width="1"/>
    
    <line x1="30" y1="0" x2="150" y2="50" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <circle cx="180" cy="50" r="20" fill="#1a1a2e" stroke="#f59e0b" stroke-width="2"/>
    <text x="210" y="55" fill="#f59e0b" font-family="monospace" font-size="9">SPOOFED</text>
  </g>
  
  <!-- Title -->
  <text x="672" y="700" text-anchor="middle" fill="url(#glowGrad)" font-family="Arial, sans-serif" font-size="32" font-weight="bold" filter="url(#glow)">MAC SPOOFER</text>
  <text x="672" y="735" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="14">WiFi Network Analysis &amp; MAC Address Spoofing Tool</text>
</svg>