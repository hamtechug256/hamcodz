<svg xmlns="http://www.w3.org/2000/svg" width="1344" height="768" viewBox="0 0 1344 768">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0f0a0a"/>
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dangerGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1344" height="768" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.08">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ef4444" stroke-width="0.5"/>
    </pattern>
    <rect width="1344" height="768" fill="url(#grid)"/>
  </g>
  
  <!-- Router Device -->
  <g transform="translate(200, 200)">
    <!-- Router body -->
    <rect x="0" y="50" width="200" height="80" rx="8" fill="#1a1a2e" stroke="#ef4444" stroke-width="2"/>
    
    <!-- Antennas -->
    <rect x="30" y="0" width="8" height="60" rx="4" fill="#333" stroke="#ef4444" stroke-width="1"/>
    <rect x="162" y="0" width="8" height="60" rx="4" fill="#333" stroke="#ef4444" stroke-width="1"/>
    
    <!-- LEDs -->
    <circle cx="40" cy="75" r="5" fill="#22c55e"/>
    <circle cx="60" cy="75" r="5" fill="#22c55e"/>
    <circle cx="80" cy="75" r="5" fill="#ef4444">
      <animate attributeName="opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="75" r="5" fill="#f59e0b"/>
    
    <!-- Ports -->
    <rect x="20" y="100" width="15" height="20" rx="2" fill="#333"/>
    <rect x="45" y="100" width="15" height="20" rx="2" fill="#333"/>
    <rect x="70" y="100" width="15" height="20" rx="2" fill="#333"/>
    <rect x="95" y="100" width="15" height="20" rx="2" fill="#333"/>
    
    <!-- Brand -->
    <text x="150" y="115" fill="#ef4444" font-family="Arial" font-size="12" font-weight="bold">MIKROTIK</text>
  </g>
  
  <!-- Attack Arrows -->
  <g filter="url(#dangerGlow)">
    <path d="M 420 250 L 500 250" stroke="#ef4444" stroke-width="3" stroke-dasharray="10,5">
      <animate attributeName="stroke-dashoffset" values="0;-30" dur="0.5s" repeatCount="indefinite"/>
    </path>
    <polygon points="500,250 485,242 485,258" fill="#ef4444"/>
  </g>
  
  <!-- Terminal Window -->
  <g transform="translate(520, 100)">
    <rect x="0" y="0" width="550" height="380" rx="10" fill="#1a1a2e" stroke="#ef4444" stroke-width="2"/>
    <rect x="0" y="0" width="550" height="35" rx="10" fill="#16213e"/>
    <circle cx="25" cy="17" r="6" fill="#ff5f56"/>
    <circle cx="45" cy="17" r="6" fill="#ffbd2e"/>
    <circle cx="65" cy="17" r="6" fill="#27ca40"/>
    <text x="275" y="22" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="12">routerpwn.py - PRIVILEGE ESCALATION</text>
    
    <!-- Terminal content -->
    <text x="15" y="60" fill="#ef4444" font-family="monospace" font-size="10">root@kali:~# python3 routerpwn.py --target 192.168.1.1</text>
    <text x="15" y="85" fill="#f97316" font-family="monospace" font-size="10">[!] RouterPwn Framework v2.0 - Advanced Router Pentesting</text>
    <text x="15" y="110" fill="#10b981" font-family="monospace" font-size="10">[*] Scanning target: 192.168.1.1...</text>
    <text x="15" y="135" fill="#e2e8f0" font-family="monospace" font-size="10">[+] Router identified: MikroTik RouterOS v6.45.9</text>
    <text x="15" y="160" fill="#f59e0b" font-family="monospace" font-size="10">[!] CVE-2019-3924: Vulnerability FOUND!</text>
    <text x="15" y="185" fill="#ef4444" font-family="monospace" font-size="10">[*] Testing default credentials...</text>
    <text x="15" y="210" fill="#22c55e" font-family="monospace" font-size="10">[✓] CREDENTIAL FOUND: admin:admin</text>
    <text x="15" y="235" fill="#ef4444" font-family="monospace" font-size="10">[*] Attempting privilege escalation...</text>
    <text x="15" y="260" fill="#f97316" font-family="monospace" font-size="10">[!] Exploiting CVE-2018-7445...</text>
    <text x="15" y="285" fill="#22c55e" font-family="monospace" font-size="10">[✓] PRIVILEGE ESCALATION SUCCESSFUL!</text>
    <text x="15" y="310" fill="#ef4444" font-family="monospace" font-size="10" font-weight="bold">[!] ADMIN ACCESS GRANTED - FULL CONTROL</text>
    <text x="15" y="335" fill="#64748b" font-family="monospace" font-size="10">[*] Generating report...</text>
    <text x="15" y="360" fill="#06b6d4" font-family="monospace" font-size="10">root@kali:~# _</text>
  </g>
  
  <!-- Vulnerability Scanner Panel -->
  <g transform="translate(1100, 150)">
    <rect x="0" y="0" width="200" height="280" rx="8" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="11" font-weight="bold">CVE DATABASE</text>
    
    <g transform="translate(10, 40)">
      <rect x="0" y="0" width="180" height="25" rx="3" fill="#0f1419"/>
      <text x="10" y="17" fill="#ef4444" font-family="monospace" font-size="9">CVE-2019-3924</text>
      <text x="160" y="17" fill="#ef4444" font-family="monospace" font-size="9">CRIT</text>
    </g>
    <g transform="translate(10, 70)">
      <rect x="0" y="0" width="180" height="25" rx="3" fill="#0f1419"/>
      <text x="10" y="17" fill="#f97316" font-family="monospace" font-size="9">CVE-2018-7445</text>
      <text x="160" y="17" fill="#f97316" font-family="monospace" font-size="9">HIGH</text>
    </g>
    <g transform="translate(10, 100)">
      <rect x="0" y="0" width="180" height="25" rx="3" fill="#0f1419"/>
      <text x="10" y="17" fill="#f59e0b" font-family="monospace" font-size="9">CVE-2020-8771</text>
      <text x="160" y="17" fill="#f59e0b" font-family="monospace" font-size="9">MED</text>
    </g>
    <g transform="translate(10, 130)">
      <rect x="0" y="0" width="180" height="25" rx="3" fill="#0f1419"/>
      <text x="10" y="17" fill="#10b981" font-family="monospace" font-size="9">CVE-2019-1308</text>
      <text x="160" y="17" fill="#10b981" font-family="monospace" font-size="9">LOW</text>
    </g>
    
    <text x="100" y="185" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">CREDENTIALS TESTED</text>
    <text x="100" y="210" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="24" font-weight="bold">147</text>
    
    <text x="100" y="245" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">EXPLOIT MODULES</text>
    <text x="100" y="270" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="24" font-weight="bold">12</text>
  </g>
  
  <!-- Network Map -->
  <g transform="translate(200, 500)">
    <text x="0" y="0" fill="#64748b" font-family="monospace" font-size="10">NETWORK TOPOLOGY</text>
    
    <!-- Central router -->
    <rect x="80" y="30" width="60" height="40" rx="4" fill="#1a1a2e" stroke="#ef4444" stroke-width="2"/>
    <text x="110" y="55" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="8">TARGET</text>
    
    <!-- Connections -->
    <line x1="110" y1="70" x2="30" y2="120" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <line x1="110" y1="70" x2="110" y2="120" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <line x1="110" y1="70" x2="190" y2="120" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    
    <!-- Nodes -->
    <circle cx="30" cy="130" r="15" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
    <text x="30" y="133" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="6">PWNED</text>
    
    <circle cx="110" cy="130" r="15" fill="#1a1a2e" stroke="#10b981" stroke-width="1"/>
    <text x="110" y="133" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="6">SAFE</text>
    
    <circle cx="190" cy="130" r="15" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
    <text x="190" y="133" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="6">VULN</text>
  </g>
  
  <!-- Warning Banner -->
  <g transform="translate(500, 530)">
    <rect x="0" y="0" width="450" height="50" rx="6" fill="#1a1a2e" stroke="#ef4444" stroke-width="2"/>
    <text x="225" y="20" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="11" font-weight="bold">⚠ AUTHORIZED PENETRATION TESTING ONLY ⚠</text>
    <text x="225" y="38" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Use only on networks you have permission to test</text>
  </g>
  
  <!-- Title -->
  <text x="672" y="700" text-anchor="middle" fill="url(#dangerGrad)" font-family="Arial, sans-serif" font-size="32" font-weight="bold" filter="url(#dangerGlow)">ROUTERPWN FRAMEWORK</text>
  <text x="672" y="735" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="14">Automated Router Penetration Testing &amp; Exploitation</text>
</svg>